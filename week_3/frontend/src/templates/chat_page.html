<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-dark text-white">

<script>
    const BACKEND_URL = "{{ backend_url }}";
</script>

<div class="container py-4">
    <h3 class="text-center mb-4">💬 Chat Bot</h3>

    <!-- CHAT BOX -->
    <div id="chatBox"
        class="border rounded p-3 bg-white"
        style="height: 70vh; overflow-y: auto;"
    >
        <div class="text-start mb-2">
            <div class="d-inline-block p-2 rounded bg-dark-subtle text-dark">
                Hello! How can I help you?
            </div>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="mt-3">

        <!-- FILE PREVIEW -->
        <div id="fileContainer" class="mb-2 d-none"></div>

        <div class="d-flex align-items-center gap-2">

            <!-- FILE INPUT -->
            <input type="file"
                   id="fileInput"
                   accept="application/pdf"
                   multiple
                   hidden />

            <!-- UPLOAD BUTTON -->
            <button onclick="document.getElementById('fileInput').click()"
                    class="btn btn-light rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 45px; height: 45px;">
                <i class="bi bi-plus-lg"></i>
            </button>

            <!-- TEXT INPUT -->
            <textarea id="messageInput"
                class="form-control rounded-3"
                placeholder="Type your message..."
                rows="1"
                style="resize:none; overflow:hidden; min-height:45px; max-height:150px;">
            </textarea>

            <!-- SEND BUTTON -->
            <button onclick="sendMessage()"
                    class="btn btn-light rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 45px; height: 45px;">
                <i class="bi bi-arrow-up"></i>
            </button>

        </div>
    </div>
</div>

<script src="/static/js/chat_page.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
